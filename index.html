<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakaroğlu Nakliyat | İzmir Evden Eve Nakliyat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">BAKAROĞLU NAKLİYAT</div>

    <div class="menu-toggle">☰</div>

    <div class="nav-links">
      <a href="index.html">Ana Sayfa</a>
      <a href="#">Hakkımızda</a>
      <a href="#">Hizmetler</a>
      <a href="#">İletişim</a>
    </div>
  </div>

  <section style="padding:60px 20px; text-align:center;">
    <h1>İzmir Evden Eve Nakliyat</h1>
    <p>Profesyonel, güvenilir ve hızlı taşımacılık hizmeti.</p>

    <!-- ARAMA KUTUSU -->
    <div style="margin-top:30px;">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Hizmet ara..." 
        style="padding:10px; width:250px; max-width:80%; border:1px solid #ccc; border-radius:5px;"
      >
      <button 
        onclick="searchFunction()" 
        style="padding:10px 15px; background:#111; color:white; border:none; border-radius:5px; cursor:pointer;"
      >
        Ara
      </button>
    </div>

  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".menu-toggle");
      const nav = document.querySelector(".nav-links");

      toggle.addEventListener("click", function () {
        nav.classList.toggle("active");
      });
    });

    function searchFunction() {
      const input = document.getElementById("searchInput").value.toLowerCase();

      if (input.includes("ev")) {
        alert("Evden Eve Nakliyat hizmetimiz mevcut.");
      } 
      else if (input.includes("ofis")) {
        alert("Ofis Taşımacılığı hizmetimiz mevcut.");
      } 
      else {
        alert("Aradığınız hizmet bulunamadı.");
      }
    }
  </script>

</body>
</html>
